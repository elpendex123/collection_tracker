<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head>
    <title>Book Detail</title>
</head>
<body>
    <div th:fragment="content">
        <h1 th:text="${book.title}">Book Title</h1>

        <dl class="row mt-4">
            <dt class="col-sm-3">Author</dt>
            <dd class="col-sm-9" th:text="${book.author ?: '-'}">Author</dd>

            <dt class="col-sm-3">ISBN</dt>
            <dd class="col-sm-9" th:text="${book.isbn ?: '-'}">ISBN</dd>

            <dt class="col-sm-3">Publisher</dt>
            <dd class="col-sm-9" th:text="${book.publisher ?: '-'}">Publisher</dd>

            <dt class="col-sm-3">Published Year</dt>
            <dd class="col-sm-9" th:text="${book.publishedYear ?: '-'}">Year</dd>

            <dt class="col-sm-3">Genre</dt>
            <dd class="col-sm-9" th:text="${book.genre ?: '-'}">Genre</dd>

            <dt class="col-sm-3">Read Status</dt>
            <dd class="col-sm-9">
                <span th:if="${book.readStatus}"
                      th:text="${book.readStatus}"
                      th:classappend="${book.readStatus.name() == 'READ' ? 'badge bg-success' : (book.readStatus.name() == 'IN_PROGRESS' ? 'badge bg-warning' : 'badge bg-secondary')}">
                </span>
                <span th:unless="${book.readStatus}">-</span>
            </dd>

            <dt class="col-sm-3">Format</dt>
            <dd class="col-sm-9" th:text="${book.format ?: '-'}">Format</dd>

            <dt class="col-sm-3">Notes</dt>
            <dd class="col-sm-9" th:text="${book.notes ?: '-'}">Notes</dd>

            <dt class="col-sm-3">Added</dt>
            <dd class="col-sm-9" th:text="${#temporals.format(book.createdAt, 'yyyy-MM-dd HH:mm')}">Date</dd>
        </dl>

        <div class="mt-4">
            <a th:href="@{/books/{id}/edit(id=${book.id})}" class="btn btn-primary">Edit</a>
            <form th:action="@{/books/{id}/delete(id=${book.id})}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-danger">Delete</button>
            </form>
            <a th:href="@{/books}" class="btn btn-secondary">Back to List</a>
        </div>
    </div>
</body>
</html>
