<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head>
    <title>Book Form</title>
</head>
<body>
    <div th:fragment="content">
        <h1 th:text="${book.id != null ? 'Edit Book' : 'Add Book'}">Book Form</h1>

        <form th:action="${book.id != null ? '/books/' + book.id : '/books'}" th:object="${book}" method="post">
            <div class="mb-3">
                <label for="title" class="form-label">Title *</label>
                <input type="text" class="form-control" id="title" th:field="*{title}" required>
                <div th:if="${#fields.hasErrors('title')}" class="text-danger" th:errors="*{title}"></div>
            </div>

            <div class="mb-3">
                <label for="author" class="form-label">Author</label>
                <input type="text" class="form-control" id="author" th:field="*{author}">
            </div>

            <div class="mb-3">
                <label for="isbn" class="form-label">ISBN</label>
                <input type="text" class="form-control" id="isbn" th:field="*{isbn}">
            </div>

            <div class="mb-3">
                <label for="publisher" class="form-label">Publisher</label>
                <input type="text" class="form-control" id="publisher" th:field="*{publisher}">
            </div>

            <div class="mb-3">
                <label for="publishedYear" class="form-label">Published Year</label>
                <input type="number" class="form-control" id="publishedYear" th:field="*{publishedYear}">
            </div>

            <div class="mb-3">
                <label for="genre" class="form-label">Genre</label>
                <input type="text" class="form-control" id="genre" th:field="*{genre}">
            </div>

            <div class="mb-3">
                <label for="readStatus" class="form-label">Read Status</label>
                <select class="form-select" id="readStatus" th:field="*{readStatus}">
                    <option value="">-- Select --</option>
                    <option th:each="status : ${readStatuses}" th:value="${status}" th:text="${status}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label for="format" class="form-label">Format</label>
                <select class="form-select" id="format" th:field="*{format}">
                    <option value="">-- Select --</option>
                    <option th:each="fmt : ${formats}" th:value="${fmt}" th:text="${fmt}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label for="notes" class="form-label">Notes</label>
                <textarea class="form-control" id="notes" th:field="*{notes}" rows="3"></textarea>
            </div>

            <div class="mb-3">
                <button type="submit" class="btn btn-primary">Save</button>
                <a th:href="@{/books}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
