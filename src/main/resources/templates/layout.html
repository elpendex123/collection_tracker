<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' - Collection Tracker' : 'Collection Tracker'}">Collection Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Collection Tracker</a>
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/books}">Books</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/comics}">Comics</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/games}">Games</a>
                </li>
            </ul>
        </div>
    </nav>

    <main class="container mt-4">
        <div th:replace="${content}">
            <!-- Page content will be inserted here -->
        </div>
    </main>

    <footer class="container mt-5 mb-3 text-center text-muted">
        <p>Collection Tracker</p>
    </footer>
</body>
</html>
