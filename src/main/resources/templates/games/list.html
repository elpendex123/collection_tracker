<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head>
    <title>Video Games</title>
</head>
<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Video Games</h1>
            <a th:href="@{/games/new}" class="btn btn-success">Add Game</a>
        </div>

        <div th:if="${games.empty}" class="alert alert-info">
            No video games in your collection yet.
        </div>

        <table th:if="${!games.empty}" class="table table-striped">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Console</th>
                    <th>Genre</th>
                    <th>Status</th>
                    <th>Format</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="game : ${games}">
                    <td>
                        <a th:href="@{/games/{id}(id=${game.id})}" th:text="${game.title}">Title</a>
                    </td>
                    <td th:text="${game.console}">Console</td>
                    <td th:text="${game.genre}">Genre</td>
                    <td>
                        <span th:if="${game.completionStatus}"
                              th:text="${game.completionStatus}"
                              th:classappend="${game.completionStatus.name() == 'BEATEN' ? 'badge bg-success' : (game.completionStatus.name() == 'PLAYING' ? 'badge bg-warning' : (game.completionStatus.name() == 'DROPPED' ? 'badge bg-danger' : 'badge bg-secondary'))}">
                        </span>
                    </td>
                    <td th:text="${game.format}">Format</td>
                    <td>
                        <a th:href="@{/games/{id}/edit(id=${game.id})}" class="btn btn-sm btn-outline-primary">Edit</a>
                        <form th:action="@{/games/{id}/delete(id=${game.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
