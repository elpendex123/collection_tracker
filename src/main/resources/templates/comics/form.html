<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head>
    <title>Comic Form</title>
</head>
<body>
    <div th:fragment="content">
        <h1 th:text="${comic.id != null ? 'Edit Comic' : 'Add Comic'}">Comic Form</h1>

        <form th:action="${comic.id != null ? '/comics/' + comic.id : '/comics'}" th:object="${comic}" method="post">
            <div class="mb-3">
                <label for="title" class="form-label">Title *</label>
                <input type="text" class="form-control" id="title" th:field="*{title}" required>
                <div th:if="${#fields.hasErrors('title')}" class="text-danger" th:errors="*{title}"></div>
            </div>

            <div class="mb-3">
                <label for="series" class="form-label">Series</label>
                <input type="text" class="form-control" id="series" th:field="*{series}">
            </div>

            <div class="mb-3">
                <label for="issueNumber" class="form-label">Issue Number</label>
                <input type="text" class="form-control" id="issueNumber" th:field="*{issueNumber}">
            </div>

            <div class="mb-3">
                <label for="isbn" class="form-label">ISBN</label>
                <input type="text" class="form-control" id="isbn" th:field="*{isbn}">
            </div>

            <div class="mb-3">
                <label for="writer" class="form-label">Writer</label>
                <input type="text" class="form-control" id="writer" th:field="*{writer}">
            </div>

            <div class="mb-3">
                <label for="artist" class="form-label">Artist</label>
                <input type="text" class="form-control" id="artist" th:field="*{artist}">
            </div>

            <div class="mb-3">
                <label for="readStatus" class="form-label">Read Status</label>
                <select class="form-select" id="readStatus" th:field="*{readStatus}">
                    <option value="">-- Select --</option>
                    <option th:each="status : ${readStatuses}" th:value="${status}" th:text="${status}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label for="format" class="form-label">Format</label>
                <select class="form-select" id="format" th:field="*{format}">
                    <option value="">-- Select --</option>
                    <option th:each="fmt : ${formats}" th:value="${fmt}" th:text="${fmt}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label for="notes" class="form-label">Notes</label>
                <textarea class="form-control" id="notes" th:field="*{notes}" rows="3"></textarea>
            </div>

            <div class="mb-3">
                <button type="submit" class="btn btn-primary">Save</button>
                <a th:href="@{/comics}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
